name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TREESEED_GITHUB_AUTOMATION_MODE: stub
      TREESEED_STAGE_WAIT_MODE: skip
      TREESEED_AGENT_DISABLE_GIT: "true"
      TREESEED_FIXTURE_ID: treeseed-working-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          install_with_retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "dependency install failed; retrying (${attempt}/3)."
              sleep $((attempt * 5))
            done
            "$@"
          }
          if test -f package-lock.json; then
            install_with_retry npm ci
          else
            install_with_retry npm install --no-audit --no-fund
          fi

      - name: Verify package
        run: npm run verify:direct
