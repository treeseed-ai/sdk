entries:
  GH_TOKEN:
    label: GitHub access token
    group: auth
    description: Personal access token used by Treeseed for GitHub CLI automation, repository setup, CI secret sync, and GitHub Copilot SDK-backed workflows.
    howToGet: "Create a GitHub fine-grained personal access token scoped to the TreeSeed repository. Required repository permissions: Contents read/write, Environments read/write, Secrets and variables read/write, Actions and workflows read/write, Pull requests read/write, Issues read/write. Then paste it here as GH_TOKEN."
    sensitivity: secret
    targets:
      - local-runtime
      - railway-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - save
      - config
    validation:
      kind: nonempty
      minLength: 8
    sourcePriority:
      - machine-config
      - process-env
  CLOUDFLARE_API_TOKEN:
    label: Cloudflare API token
    group: auth
    description: Account-level Cloudflare API token used by Wrangler and CI to manage Pages, Workers, Workers KV, D1, Queues, DNS, secrets, and deploys.
    howToGet: "Create a Cloudflare account-level API token scoped to the target domain and account. Required permissions: Account Cloudflare Pages edit, Account Workers Scripts edit, Account Workers KV Storage edit, Account D1 edit, Account Queues edit, Zone DNS edit. Then paste it here as CLOUDFLARE_API_TOKEN."
    sensitivity: secret
    targets:
      - local-runtime
      - github-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - save
      - deploy
      - destroy
      - config
    validation:
      kind: nonempty
      minLength: 8
    sourcePriority:
      - machine-config
      - process-env
  RAILWAY_API_TOKEN:
    label: Railway API token
    group: auth
    description: Primary Railway token for user or workspace scoped access, including project creation and most Treeseed-managed Railway flows.
    howToGet: In Railway, create a user or workspace API token that can create and manage the target project, then paste it here. Treeseed also accepts the legacy alias RAILWAY_API_KEY from process env.
    sensitivity: secret
    targets:
      - local-runtime
      - railway-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - deploy
      - destroy
      - config
    validation:
      kind: nonempty
      minLength: 8
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: railwayManagedEnabled
    requiredWhenRef: railwayManagedEnabled
  TREESEED_RAILWAY_WORKSPACE:
    label: Railway workspace
    group: railway
    description: Railway workspace Treeseed should use when listing or creating projects during bootstrap and config reconciliation.
    howToGet: In Railway, use the workspace slug or name shown in the workspace switcher. Treeseed defaults this repository to knowledge-coop unless you override it here.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - deploy
      - destroy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: railwayWorkspaceDefault
    relevanceRef: railwayManagedEnabled
    requiredWhenRef: railwayManagedEnabled
  CLOUDFLARE_ACCOUNT_ID:
    label: Cloudflare account ID
    group: cloudflare
    description: Identifies the Cloudflare account Treeseed should provision and deploy into.
    howToGet: In the Cloudflare dashboard, open Workers & Pages or Account Home and copy the account ID.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - config-file
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - save
      - deploy
      - destroy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_CLOUDFLARE_PAGES_PROJECT_NAME:
    label: Cloudflare Pages project name
    group: cloudflare
    description: Production Pages project used for the Treeseed web deployment.
    howToGet: Treeseed can default this from the site slug. Override it if the Cloudflare Pages project should use a different name.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: pagesProjectNameDefault
  TREESEED_CLOUDFLARE_PAGES_PREVIEW_PROJECT_NAME:
    label: Cloudflare staging Pages project
    group: cloudflare
    description: Staging Pages project used for non-production Treeseed web deployments.
    howToGet: Treeseed can default this from the production Pages project name with a -staging suffix.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: pagesPreviewProjectNameDefault
  TREESEED_CONTENT_BUCKET_NAME:
    label: Cloudflare R2 content bucket
    group: cloudflare
    description: Shared R2 bucket name that stores team-scoped published content, artifacts, and editorial overlays.
    howToGet: Treeseed can default this from the site slug with a -content suffix. Override it if the shared bucket should use a different name.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: contentBucketNameDefault
  TREESEED_CONTENT_BUCKET_BINDING:
    label: Cloudflare R2 binding name
    group: cloudflare
    description: Worker binding name used to mount the shared Treeseed content bucket.
    howToGet: Treeseed defaults this to TREESEED_CONTENT_BUCKET unless you need a different binding name.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: contentBucketBindingDefault
  TREESEED_EDITORIAL_PREVIEW_SECRET:
    label: Editorial preview signing secret
    group: cloudflare
    description: Shared HMAC secret used to sign and verify temporary editorial preview links and cookies.
    howToGet: Treeseed can generate a strong random secret for you. Reuse the same value across hosted environments so preview links remain valid during staging-to-production promotion.
    sensitivity: secret
    targets:
      - local-runtime
      - github-secret
      - cloudflare-secret
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  TREESEED_HOSTING_KIND:
    label: Treeseed hosting kind
    group: hosting
    description: Declares whether this repository is the central market control plane, a Treeseed-hosted project platform, or a self-hosted project platform.
    howToGet: Treeseed can derive this from the hosting block in treeseed.site.yaml. Override it only when the runtime environment must force a different deployment profile.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
      - config-file
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: enum
      values:
        - market_control_plane
        - hosted_project
        - self_hosted_project
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: hostingKindDefault
  TREESEED_HOSTING_REGISTRATION:
    label: Treeseed hosting registration mode
    group: hosting
    description: Controls whether a self-hosted project should register itself with the market control plane or remain completely standalone.
    howToGet: Treeseed can derive this from the hosting block in treeseed.site.yaml.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
      - config-file
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: enum
      values:
        - optional
        - none
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: hostingRegistrationDefault
  TREESEED_MARKET_API_BASE_URL:
    label: Treeseed market API base URL
    group: hosting
    description: Base URL for the market control-plane API used by hosted and optionally registered self-hosted project platforms.
    howToGet: Use the hosted market API URL if Treeseed manages the project for you. Self-hosted deployments should only set this when registration with the market control plane is enabled.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: url
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    relevanceRef: projectRegistrationEnabled
    requiredWhenRef: projectRegistrationEnabled
    defaultValueRef: marketBaseUrlDefault
  TREESEED_HOSTING_TEAM_ID:
    label: Hosted team ID
    group: hosting
    description: Team identifier used by hosted or registered project platforms when they publish infra metadata, register agent pools, or resolve team-scoped content.
    howToGet: Treeseed defaults this to the site slug unless you need a different hosted team identifier.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: projectRegistrationEnabled
    requiredWhenRef: projectRegistrationEnabled
    defaultValueRef: hostingTeamIdDefault
  TREESEED_PROJECT_ID:
    label: Hosted project ID
    group: hosting
    description: Stable project identifier used by hosted or registered self-hosted project platforms for dispatch, deploy reporting, and agent-pool registration.
    howToGet: Treeseed defaults this to the site slug unless you need a different hosted project identifier.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: projectRegistrationEnabled
    requiredWhenRef: projectRegistrationEnabled
    defaultValueRef: hostingProjectIdDefault
  TREESEED_PROJECT_RUNNER_TOKEN:
    label: Project runner registration token
    group: hosting
    description: Shared bearer token used by manager, worker, and agents services to authenticate against the market control plane for remote jobs and agent-pool registration.
    howToGet: Generate or rotate this token from the market control plane after connecting a project environment.
    sensitivity: secret
    targets:
      - local-runtime
      - github-secret
      - railway-secret
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: projectRegistrationEnabled
  TREESEED_AGENT_POOL_MIN_WORKERS:
    label: Agent pool minimum workers
    group: hosting
    description: Lower autoscaling bound for the Railway worker service for one project environment.
    howToGet: Set this to 0 for scale-to-zero by default unless the project requires warm workers.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: railwayManagedEnabled
    defaultValueRef: agentPoolMinWorkersDefault
  TREESEED_AGENT_POOL_MAX_WORKERS:
    label: Agent pool maximum workers
    group: hosting
    description: Upper autoscaling bound for the Railway worker service for one project environment.
    howToGet: Choose a value that reflects your budget and expected concurrency ceiling.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: railwayManagedEnabled
    defaultValueRef: agentPoolMaxWorkersDefault
  TREESEED_AGENT_POOL_TARGET_QUEUE_DEPTH:
    label: Agent pool target queue depth
    group: hosting
    description: Desired queue depth per worker instance that the manager uses when computing worker scale.
    howToGet: Start with 1 for conservative scaling, then raise it only after observing stable worker latency.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: railwayManagedEnabled
    defaultValueRef: agentPoolTargetQueueDepthDefault
  TREESEED_AGENT_POOL_COOLDOWN_SECONDS:
    label: Agent pool cooldown seconds
    group: hosting
    description: Cooldown window the manager uses before scaling the worker pool down after queue activity drops.
    howToGet: Start with 60 seconds to prevent worker thrash in lightly bursty environments.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: railwayManagedEnabled
    defaultValueRef: agentPoolCooldownSecondsDefault
  TREESEED_WORKDAY_TIMEZONE:
    label: Workday timezone
    group: hosting
    description: IANA timezone used when evaluating active work windows for the manager.
    howToGet: Use the project team's operating timezone, such as America/New_York.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: workdayTimezoneDefault
  TREESEED_WORKDAY_WINDOWS_JSON:
    label: Workday schedule JSON
    group: hosting
    description: JSON array of recurring work windows used by the manager to decide when to open or close a workday.
    howToGet: Provide a JSON value like [{"days":[1,2,3,4,5],"startTime":"09:00","endTime":"17:00"}].
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: workdayWindowsDefault
  TREESEED_WORKDAY_TASK_CREDIT_BUDGET:
    label: Daily task-credit budget
    group: hosting
    description: Maximum task credits the manager may allocate during one workday before it stops seeding new work.
    howToGet: Choose the daily throughput ceiling that matches the team's Copilot and infrastructure budget.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: workdayTaskCreditBudgetDefault
  TREESEED_MANAGER_MAX_QUEUED_TASKS:
    label: Manager max queued tasks
    group: hosting
    description: Upper bound on how many runnable tasks the manager will keep queued at one time.
    howToGet: Start small so queue top-ups stay budget-aware and incremental.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: managerMaxQueuedTasksDefault
  TREESEED_MANAGER_MAX_QUEUED_CREDITS:
    label: Manager max queued credits
    group: hosting
    description: Credit ceiling for runnable queued work so the manager never seeds the entire day’s budget at once.
    howToGet: Set this lower than or equal to the daily task-credit budget.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: managerMaxQueuedCreditsDefault
  TREESEED_MANAGER_PRIORITY_MODELS:
    label: Manager priority models
    group: hosting
    description: Comma-separated content models the manager should evaluate when building priority snapshots.
    howToGet: Leave unset to use the default objective/question/note/page/book/knowledge set.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: managerPriorityModelsDefault
  TREESEED_TASK_CREDIT_WEIGHTS_JSON:
    label: Task credit weights JSON
    group: hosting
    description: JSON array of task-type or model-specific credit weights used when estimating daily budget consumption.
    howToGet: Provide a JSON value such as [{"type":"question","credits":3}].
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: taskCreditWeightsDefault
  TREESEED_WORKER_POOL_SCALER:
    label: Worker pool scaler kind
    group: hosting
    description: Selects the runtime worker scaler adapter. Hosted Railway projects should normally use railway.
    howToGet: Set this to railway for hosted projects or noop/manual for self-hosted environments without automatic scale control.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: enum
      values:
        - railway
        - noop
        - manual
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: workerPoolScalerDefault
  TREESEED_RAILWAY_PROJECT_ID:
    label: Railway project ID
    group: hosting
    description: Railway project identifier used by runtime scaling and reconciliation helpers for the active environment.
    howToGet: Copy the project ID from Railway when automatic worker scaling is enabled.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_RAILWAY_ENVIRONMENT_ID:
    label: Railway environment ID
    group: hosting
    description: Railway environment identifier used by the runtime scaler when adjusting worker replicas.
    howToGet: Copy the environment ID from Railway for the matching staging or production environment.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_RAILWAY_WORKER_SERVICE_ID:
    label: Railway worker service ID
    group: hosting
    description: Railway service identifier for the scalable worker pool that the manager adjusts at runtime.
    howToGet: Copy the worker service ID from Railway after the hosted project environment is provisioned.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_FORM_TOKEN_SECRET:
    label: Forms token secret
    group: forms
    cluster: forms-core
    startupProfile: core
    description: Signs form-related tokens and protects Treeseed forms workflows in local and hosted runtimes.
    howToGet: Treeseed can generate a strong random secret for you. Reuse it across environments only if that matches your security model.
    sensitivity: secret
    targets:
      - local-runtime
      - local-cloudflare
      - github-secret
      - cloudflare-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
    localDefaultValueRef: generatedSecret
  TREESEED_PUBLIC_TURNSTILE_SITE_KEY:
    label: Turnstile site key
    group: forms
    cluster: turnstile
    description: Public site key used by the browser to render the Turnstile challenge when forms protection is enabled.
    howToGet: Create a Turnstile widget in Cloudflare Turnstile and copy the site key.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: turnstileEnabled
    requiredWhenRef: turnstileNonLocal
  TREESEED_TURNSTILE_SECRET_KEY:
    label: Turnstile secret key
    group: forms
    cluster: turnstile
    description: Server-side Turnstile secret used to verify challenge responses.
    howToGet: Create a Turnstile widget in Cloudflare Turnstile and copy the secret key.
    sensitivity: secret
    targets:
      - local-runtime
      - local-cloudflare
      - github-secret
      - cloudflare-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: turnstileEnabled
    requiredWhenRef: turnstileNonLocal
  TREESEED_PUBLIC_FORMS_LOCAL_BYPASS_TURNSTILE:
    label: Local Turnstile bypass
    group: local-development
    description: Lets contributors edit content and exercise forms locally without a live Turnstile widget.
    howToGet: Treeseed defaults this to true for local development. You can switch it off if you want to test with real Turnstile keys locally.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
    scopes:
      - local
    requirement: optional
    purposes:
      - dev
      - config
    validation:
      kind: boolean
    sourcePriority:
      - machine-config
      - process-env
    localDefaultValueRef: localFormsBypassDefault
  TREESEED_SMTP_HOST:
    label: SMTP host
    group: smtp
    cluster: smtp
    description: SMTP host for Treeseed email delivery when SMTP-backed forms behavior is enabled.
    howToGet: Use the SMTP hostname from your email provider or local Mailpit instance.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    localDefaultValueRef: localMailpitHostDefault
    relevanceRef: smtpEnabled
