entries:
  GH_TOKEN:
    label: GitHub access token
    group: auth
    description: Personal access token used by Treeseed for GitHub CLI automation, repository setup, CI secret sync, and GitHub Copilot SDK-backed workflows.
    howToGet: "Create a GitHub fine-grained personal access token scoped to the TreeSeed repository. Required repository permissions: Contents read/write, Environments read/write, Secrets and variables read/write, Actions and workflows read/write, Pull requests read/write, Issues read/write. Then paste it here as GH_TOKEN."
    sensitivity: secret
    targets:
      - local-runtime
      - railway-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - save
      - config
    validation:
      kind: nonempty
      minLength: 8
    sourcePriority:
      - machine-config
      - process-env
  RAILWAY_API_TOKEN:
    label: Railway API token
    group: auth
    description: Account-level Railway API token used by Treeseed to provision, reconcile, deploy, and inspect Market Railway services.
    howToGet: Create a Railway account API token with access to the Treeseed Market project/workspace, then store it through Treeseed config as RAILWAY_API_TOKEN.
    sensitivity: secret
    targets:
      - local-runtime
      - github-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 8
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: railwayManagedEnabled
    requiredWhenRef: railwayManagedEnabled
  TREESEED_GITHUB_OWNER:
    label: GitHub repository owner
    group: github
    description: GitHub user or organization that owns the Treeseed repository used for bootstrap, CI/CD, and environment sync.
    howToGet: Treeseed suggests this from the origin remote when available. Otherwise enter the GitHub user or organization that should own the repository.
    sensitivity: plain
    targets:
      - local-runtime
    scopes:
      - local
    storage: scoped
    requirement: required
    purposes:
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: githubOwnerDefault
  TREESEED_GITHUB_REPOSITORY_NAME:
    label: GitHub repository name
    group: github
    description: GitHub repository name Treeseed should verify or create before GitHub bootstrap.
    howToGet: Treeseed suggests this from the origin remote when available and otherwise defaults it from the site slug.
    sensitivity: plain
    targets:
      - local-runtime
    scopes:
      - local
    storage: scoped
    requirement: required
    purposes:
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: githubRepositoryNameDefault
  TREESEED_GITHUB_REPOSITORY_VISIBILITY:
    label: GitHub repository visibility
    group: github
    description: Visibility to use if Treeseed needs to create the GitHub repository during bootstrap.
    howToGet: Choose private, public, or internal. Treeseed defaults new repositories to private.
    sensitivity: plain
    targets:
      - local-runtime
    scopes:
      - local
    storage: scoped
    requirement: optional
    purposes:
      - config
    validation:
      kind: enum
      values:
        - private
        - public
        - internal
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: githubRepositoryVisibilityDefault
  CLOUDFLARE_API_TOKEN:
    label: Cloudflare API token
    group: auth
    description: Account-level Cloudflare API token used by Wrangler, Workers AI, and CI to manage Pages, Workers, Workers KV, D1, Queues, DNS, secrets, and deploys.
    howToGet: "Create a Cloudflare account-level API token scoped to the target domain and account. Required permissions: Account Cloudflare Pages edit, Account Workers Scripts edit, Account Workers KV Storage edit, Account D1 edit, Account Queues edit, Zone DNS edit, Workers AI Read, and Workers AI Edit for model execution. If TREESEED_COMMIT_AI_GATEWAY_ID is configured, also grant AI Gateway Read/Run access for the gateway. Then paste it here as CLOUDFLARE_API_TOKEN."
    sensitivity: secret
    targets:
      - local-runtime
      - github-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - save
      - deploy
      - destroy
      - config
    validation:
      kind: nonempty
      minLength: 8
    sourcePriority:
      - machine-config
      - process-env
  CLOUDFLARE_ACCOUNT_ID:
    label: Cloudflare account ID
    group: cloudflare
    description: Identifies the Cloudflare account Treeseed should provision, deploy into, and use for Workers AI commit message generation.
    howToGet: In the Cloudflare dashboard, open Workers & Pages or Account Home and copy the account ID.
    startupProfile: core
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
      - config-file
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - save
      - deploy
      - destroy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_CLOUDFLARE_PAGES_PROJECT_NAME:
    label: Cloudflare Pages project name
    group: cloudflare
    description: Production Pages project used for the Treeseed web deployment.
    howToGet: Treeseed can default this from the site slug. Override it if the Cloudflare Pages project should use a different name.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: pagesProjectNameDefault
  TREESEED_CLOUDFLARE_PAGES_PREVIEW_PROJECT_NAME:
    label: Cloudflare staging Pages project
    group: cloudflare
    description: Staging Pages project used for non-production Treeseed web deployments.
    howToGet: Treeseed can default this from the production Pages project name with a -staging suffix.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: pagesPreviewProjectNameDefault
  TREESEED_CONTENT_BUCKET_NAME:
    label: Cloudflare R2 content bucket
    group: cloudflare
    description: Shared R2 bucket name that stores team-scoped published content, artifacts, and editorial overlays.
    howToGet: Treeseed can default this from the site slug with a -content suffix. Override it if the shared bucket should use a different name.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: contentBucketNameDefault
  TREESEED_CONTENT_BUCKET_BINDING:
    label: Cloudflare R2 binding name
    group: cloudflare
    description: Worker binding name used to mount the shared Treeseed content bucket.
    howToGet: Treeseed defaults this to TREESEED_CONTENT_BUCKET unless you need a different binding name.
    sensitivity: plain
    targets:
      - local-runtime
      - github-variable
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: contentBucketBindingDefault
  TREESEED_EDITORIAL_PREVIEW_SECRET:
    label: Editorial preview signing secret
    group: cloudflare
    description: Shared HMAC secret used to sign and verify temporary editorial preview links and cookies.
    howToGet: Treeseed can generate a strong random secret for you. Reuse the same value across hosted environments so preview links remain valid during staging-to-production promotion.
    sensitivity: secret
    targets:
      - local-runtime
      - github-secret
      - cloudflare-secret
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  TREESEED_HOSTING_KIND:
    label: Treeseed hosting kind
    group: hosting
    description: Declares whether this repository is the central market control plane, a Treeseed-hosted project platform, or a self-hosted project platform.
    howToGet: Treeseed can derive this from the hosting block in treeseed.site.yaml. Override it only when the runtime environment must force a different deployment profile.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
      - config-file
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: enum
      values:
        - market_control_plane
        - hosted_project
        - self_hosted_project
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: hostingKindDefault
  TREESEED_HOSTING_REGISTRATION:
    label: Treeseed hosting registration mode
    group: hosting
    description: Controls whether a self-hosted project should register itself with the market control plane or remain completely standalone.
    howToGet: Treeseed can derive this from the hosting block in treeseed.site.yaml.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
      - config-file
    scopes:
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: enum
      values:
        - optional
        - none
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: hostingRegistrationDefault
  TREESEED_CENTRAL_MARKET_API_BASE_URL:
    label: Treeseed central market API base URL
    group: hosting
    description: Base URL for the always-available central TreeSeed market used when no team-specific specialized market is selected.
    howToGet: The production TreeSeed market defaults to https://api.treeseed.ai. Set this only when an environment should use another central-compatible market endpoint.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
      - config-file
    scopes:
      - staging
      - prod
    storage: shared
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: url
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: centralMarketBaseUrlDefault
  TREESEED_MARKET_API_BASE_URL:
    label: Treeseed default market API base URL
    group: hosting
    description: Primary market control-plane API URL used by hosted and optionally registered self-hosted project platforms.
    howToGet: The production TreeSeed market defaults to https://api.treeseed.ai. Set this to a staging, enterprise, or specialized market endpoint when that environment should register with a different market.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
    scopes:
      - staging
      - prod
    storage: shared
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: url
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    relevanceRef: projectRegistrationEnabled
    requiredWhenRef: projectRegistrationEnabled
    defaultValueRef: marketBaseUrlDefault
  TREESEED_MARKET_DATABASE_URL:
    label: Market PostgreSQL database URL
    group: hosting
    cluster: hosting:market-control-plane
    visibility: system
    description: Railway PostgreSQL connection URL for Market control-plane tables. Browser/UI code must never receive this value.
    howToGet: Provision the managed Market PostgreSQL resource through Treeseed/Railway reconciliation and store the generated connection URL as a service secret.
    sensitivity: secret
    targets:
      - railway-secret
    serviceTargets:
      - api
      - marketOperationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: url
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
  TREESEED_PLATFORM_RUNNER_SECRET:
    label: Market operations runner secret
    group: hosting
    cluster: hosting:market-operations-runner
    visibility: system
    description: Bearer credential used only by the TreeSeed-owned Market operations runner to claim and update platform operation jobs.
    howToGet: Generate a strong secret with `openssl rand -base64 48` and store it through `treeseed config` for staging and production.
    sensitivity: secret
    targets:
      - railway-secret
    serviceTargets:
      - api
      - marketOperationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 24
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  TREESEED_PLATFORM_RUNNER_ID:
    label: Market operations runner ID
    group: hosting
    cluster: hosting:market-operations-runner
    visibility: system
    description: Stable identity for the TreeSeed-owned Market operations runner service in each environment.
    howToGet: Treeseed derives this from the environment. Override it only when replacing a runner identity deliberately.
    sensitivity: plain
    targets:
      - railway-var
    serviceTargets:
      - marketOperationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: platformRunnerIdDefault
  TREESEED_PLATFORM_RUNNER_DATA_DIR:
    label: Market operations runner data directory
    group: hosting
    cluster: hosting:market-operations-runner
    visibility: system
    description: Writable data directory mounted into the Market operations runner for repository workspaces and operation state.
    howToGet: Use `/data` for Railway runner services with an attached volume.
    sensitivity: plain
    targets:
      - railway-var
    serviceTargets:
      - marketOperationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: platformRunnerDataDirDefault
  TREESEED_PLATFORM_RUNNER_ENVIRONMENT:
    label: Market operations runner environment
    group: hosting
    cluster: hosting:market-operations-runner
    visibility: system
    description: Runtime environment label reported by the Market operations runner in registration and heartbeat records.
    howToGet: Treeseed derives this from the selected environment.
    sensitivity: plain
    targets:
      - railway-var
    serviceTargets:
      - marketOperationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: conditional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: platformRunnerEnvironmentDefault
  TREESEED_CATALOG_MARKET_API_BASE_URLS:
    label: Treeseed catalog market API URLs
    group: hosting
    description: Comma-separated market API base URLs that contribute templates, knowledge packs, and shared resources to the integrated catalog.
    howToGet: Start with the production TreeSeed market at https://api.treeseed.ai and add specialized team or enterprise market API URLs as needed.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
      - config-file
    scopes:
      - staging
      - prod
    storage: shared
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: string
    sourcePriority:
      - machine-config
      - process-env
      - treeseed.site.yaml
    defaultValueRef: catalogMarketBaseUrlsDefault
  TREESEED_HOSTING_TEAM_ID:
    label: Hosted team ID
    group: hosting
    description: Team identifier used by hosted or registered project platforms when they publish infra metadata, register agent pools, or resolve team-scoped content.
    howToGet: Treeseed defaults this to the site slug unless you need a different hosted team identifier.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
    scopes:
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: projectRegistrationEnabled
    requiredWhenRef: projectRegistrationEnabled
    defaultValueRef: hostingTeamIdDefault
  TREESEED_PROJECT_ID:
    label: Hosted project ID
    group: hosting
    description: Stable project identifier used by hosted or registered self-hosted project platforms for dispatch, deploy reporting, and agent-pool registration.
    howToGet: Treeseed defaults this to the site slug unless you need a different hosted project identifier.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
    scopes:
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: projectRegistrationEnabled
    requiredWhenRef: projectRegistrationEnabled
    defaultValueRef: hostingProjectIdDefault
