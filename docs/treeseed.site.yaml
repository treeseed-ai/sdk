name: TreeSeed SDK Knowledge Hub
slug: treeseed-sdk-docs
siteUrl: https://sdk.treeseed.ai
contactEmail: hello@treeseed.email
hosting:
  kind: self_hosted_project
  registration: none
  teamId: treeseed
  projectId: sdk
hub:
  mode: treeseed_hosted
runtime:
  mode: treeseed_managed
  registration: none
cloudflare:
  workerName: treeseed-sdk-docs
  pages:
    projectName: treeseed-sdk-docs
    productionBranch: main
    stagingBranch: staging
    buildOutputDir: dist
surfaces:
  web:
    enabled: true
    provider: cloudflare
    rootDir: .
    publicBaseUrl: https://sdk.treeseed.ai
    localBaseUrl: http://127.0.0.1:4321
    local:
      runtime: local
    environments:
      staging:
        domain: sdk-docs-staging.treeseed.ai
      prod:
        domain: sdk.treeseed.ai
providers:
  agents:
    execution: codex
    mutation: local_branch
    repository: git
    verification: local
    notification: sdk_message
    research: project_graph
  deploy: cloudflare
  dns: cloudflare-dns
  content:
    serving: local_collections
    runtime: team_scoped_r2_overlay
    publish: team_scoped_r2_overlay
    docs: default
  site: default
